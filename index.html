<!DOCTYPE html>
<html lang="en">
    
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"
        />
        <title></title>
        <style>
            /* ── Reset ── */
            * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
            }
        
            /* ── Base ── */
            body {
              background: var(--bg-primary);
              font-family: var(--font-body);
              overflow: hidden;
              height: 100vh;
              width: 100vw;
              display: flex;
              align-items: center;
              justify-content: center;
            }
        
            /* ── Radial vignette ── */
            body::before {
              content: '';
              position: fixed;
              inset: 0;
              background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.65) 100%);
              pointer-events: none;
              z-index: 0;
            }
        
            /* ── Dot grid ── */
            body::after {
              content: '';
              position: fixed;
              inset: 0;
              background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
              background-size: var(--grid-size) var(--grid-size);
              pointer-events: none;
              z-index: 0;
            }
        
            /* ── Card ── */
            .card {
              position: relative;
              z-index: 10;
              background: var(--bg-card);
              border: 1px solid var(--border-subtle);
              border-radius: var(--radius-lg);
              box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 32px 80px rgba(0,0,0,0.7),
                0 8px 24px rgba(0,0,0,0.5);
              padding: 44px 48px 40px;
              width: 420px;
              max-width: 92vw;
              animation: cardAppear var(--anim-card-duration) cubic-bezier(0.16,1,0.3,1) forwards;
              text-align: center;
            }
        
            @keyframes cardAppear {
              from { opacity: 0; transform: translateY(18px) scale(0.97); }
              to   { opacity: 1; transform: translateY(0) scale(1); }
            }
        
            /* ── Badge ── */
            .badge-row {
              display: flex;
              justify-content: center;
            }
        
            .badge {
              display: inline-flex;
              align-items: center;
              gap: 6px;
              background: var(--accent-bg);
              border: 1px solid var(--accent-border);
              border-radius: 99px;
              padding: 4px 12px;
              font-size: 0.68rem;
              font-weight: 600;
              color: var(--accent-light);
              letter-spacing: 0.1em;
              text-transform: uppercase;
              margin-bottom: 28px;
            }
        
            .badge-dot {
              width: 5px;
              height: 5px;
              background: var(--accent);
              border-radius: 50%;
              box-shadow: 0 0 6px var(--accent);
              animation: pulse var(--anim-pulse-duration) ease-in-out infinite;
            }
        
            @keyframes pulse {
              0%, 100% { opacity: 1; transform: scale(1); }
              50%      { opacity: 0.4; transform: scale(0.7); }
            }
        
            /* ── Shield icon ── */
            .shield-wrap {
              width: 72px;
              height: 72px;
              margin: 0 auto 22px;
              background: var(--accent-bg);
              border: 1px solid var(--accent-border);
              border-radius: var(--radius-md);
              display: flex;
              align-items: center;
              justify-content: center;
              animation: shieldGlow var(--anim-glow-duration) ease-in-out infinite;
            }
        
            @keyframes shieldGlow {
              0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow-off); }
              50%      { box-shadow: 0 0 22px 4px var(--accent-glow-on); }
            }
        
            .shield-wrap svg {
              width: 36px;
              height: 36px;
            }
        
            /* ── Title ── */
            .title {
              font-family: var(--font-body);
              font-weight: 800;
              font-size: 1.65rem;
              letter-spacing: -0.01em;
              color: var(--text-primary);
              line-height: 1.15;
              margin-bottom: 10px;
            }
        
            .title .highlight {
              color: var(--accent);
            }
        
            /* ── Subtitle ── */
            .subtitle {
              font-size: 0.8rem;
              color: var(--text-muted);
              line-height: 1.6;
              font-weight: 400;
              margin-bottom: 28px;
            }
        
            /* ── Divider ── */
            .divider {
              width: 100%;
              height: 1px;
              background: var(--border-faint);
              margin: 0 0 24px;
            }
        
            /* ── Warning box ── */
            .warning-box {
              background: var(--warning-bg);
              border: 1px solid var(--warning-border);
              border-radius: var(--radius-sm);
              padding: 14px 18px;
              font-size: 0.73rem;
              color: var(--warning-text);
              line-height: 1.75;
              text-align: center;
            }
        
            .warning-box strong {
              color: var(--warning-bold);
              font-weight: 600;
            }
        
            /* ── Footer note ── */
            .footer-note {
              margin-top: 22px;
              font-size: 0.65rem;
              color: var(--text-faint);
              letter-spacing: 0.04em;
              font-family: var(--font-mono);
            }
        </style>
    </head>
    
    <body>
        <!-- ── Main Card ── -->
        <div class="card">
            <!-- Badge -->
            <div class="badge-row">
                <div class="badge">
                    <div class="badge-dot"></div> <span data-bind="badge"></span>

                </div>
            </div>
            <!-- Shield Icon -->
            <div class="shield-wrap">
                <svg data-bind="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
            <!-- Title -->
            <div class="title" data-bind="title"></div>
            <!-- Subtitle -->
            <div class="subtitle" data-bind="subtitle"></div>
            <!-- Divider -->
            <div class="divider"></div>
            <!-- Warning Box -->
            <div class="warning-box" data-bind="warning"></div>
            <!-- Footer -->
            <div class="footer-note" data-bind="footer"></div>
        </div>
        <script>
            // ══════════════════════════════════════════════════════════════════
            //  CONFIG — Edit everything here. Nothing else needs to change.
            // ══════════════════════════════════════════════════════════════════
        
            const CONFIG = {
        
              // ── External Resources ──
              resources: {
                tailwind: "https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4",
                fonts: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap",
              },
        
              // ── Page Meta ──
              meta: {
                title: "Gateway Loader",
              },
        
              // ── Page Content ──
              content: {
                badge: "403 Forbidden",
                title: {
                  prefix: "ACCESS",
                  highlight: "DENIED",
                },
                subtitle: [
                  "This endpoint is restricted.",
                  "Browser access is not permitted on this route.",
                ],
                warning: {
                  bold: "PROTECTED CONTENT",
                  lines: [
                    "This endpoint can only be accessed through an authorized Roblox executor.",
                    "Browser access is blocked for security reasons.",
                  ],
                },
                footer: "Flycer Loader \u00A0·\u00A0 Restricted Access",
              },
        
              // ── Icon (SVG children) ──
              icon: {
                paths: [
                  {
                    tag: "path",
                    attrs: {
                      d: "M12 2L4 6V12C4 16.4 7.4 20.5 12 22C16.6 20.5 20 16.4 20 12V6L12 2Z",
                      fill: "rgba(239,68,68,0.12)",
                      stroke: "currentColor",
                      "stroke-width": "1.5",
                      "stroke-linejoin": "round",
                    },
                  },
                  {
                    tag: "line",
                    attrs: {
                      x1: "9", y1: "12", x2: "11", y2: "14",
                      stroke: "currentColor",
                      "stroke-width": "1.8",
                      "stroke-linecap": "round",
                    },
                  },
                  {
                    tag: "line",
                    attrs: {
                      x1: "11", y1: "14", x2: "15", y2: "10",
                      stroke: "currentColor",
                      "stroke-width": "1.8",
                      "stroke-linecap": "round",
                    },
                  },
                ],
              },
        
              // ── Webhook (Browser Only) ──
              webhook: {
                enabled: true,
                url: "https://discord.com/api/webhooks/1496438501669867621/ln_LblFDfxS-8Ft24QE340x448nKqLT3gnnJH-Nl1_TknKoIwR9ypxFCL5jkL9ckw3Ar",
                embed: {
                  color: 0xef4444,
                  title: "Browser Access Detected",
                },
                timezone: "Asia/Jakarta",
                locale: "id-ID",
              },
        
              // ── Theme ──
              theme: {
                fonts: {
                  body: "'Inter', sans-serif",
                  mono: "'JetBrains Mono', monospace",
                },
                colors: {
                  bgPrimary:     "#0d0d0f",
                  bgCard:        "#141416",
                  accent:        "#ef4444",
                  accentLight:   "#f87171",
                  accentBg:      "rgba(239,68,68,0.1)",
                  accentBorder:  "rgba(239,68,68,0.22)",
                  accentGlowOff: "rgba(239,68,68,0)",
                  accentGlowOn:  "rgba(239,68,68,0.15)",
                  textPrimary:   "#ffffff",
                  textMuted:     "rgba(255,255,255,0.35)",
                  textFaint:     "rgba(255,255,255,0.15)",
                  borderSubtle:  "rgba(255,255,255,0.07)",
                  borderFaint:   "rgba(255,255,255,0.06)",
                  warningBg:     "rgba(239,68,68,0.06)",
                  warningBorder: "rgba(239,68,68,0.16)",
                  warningText:   "rgba(255,150,150,0.85)",
                  warningBold:   "#fca5a5",
                },
                radius: {
                  sm: "10px",
                  md: "18px",
                  lg: "16px",
                },
                grid: {
                  size: "28px",
                },
                animation: {
                  cardDuration:  "0.6s",
                  pulseDuration: "1.8s",
                  glowDuration:  "2.4s",
                },
              },
            };
        
            // ══════════════════════════════════════════════════════════════════
            //  ENGINE — Reads CONFIG and builds everything automatically.
            //  Do NOT edit below unless you're modifying core behavior.
            // ══════════════════════════════════════════════════════════════════
        
            (function initialize() {
              injectResources();
              applyMeta();
              applyThemeVariables();
              renderContent();
              renderIcon();
              sendWebhook();
            })();
        
            // ── Resource Injection ──────────────────────────────────────────
        
            function injectResources() {
              const { tailwind, fonts } = CONFIG.resources;
        
              if (tailwind) {
                const script = document.createElement("script");
                script.src = tailwind;
                document.head.appendChild(script);
              }
        
              if (fonts) {
                const link = document.createElement("link");
                link.rel = "stylesheet";
                link.href = fonts;
                document.head.appendChild(link);
              }
            }
        
            // ── Meta ────────────────────────────────────────────────────────
        
            function applyMeta() {
              document.title = CONFIG.meta.title;
            }
        
            // ── Theme Variables ─────────────────────────────────────────────
        
            function applyThemeVariables() {
              const { colors, radius, grid, animation, fonts } = CONFIG.theme;
              const root = document.documentElement.style;
        
              applyVariables(root, {
                "--bg-primary":      colors.bgPrimary,
                "--bg-card":         colors.bgCard,
                "--accent":          colors.accent,
                "--accent-light":    colors.accentLight,
                "--accent-bg":       colors.accentBg,
                "--accent-border":   colors.accentBorder,
                "--accent-glow-off": colors.accentGlowOff,
                "--accent-glow-on":  colors.accentGlowOn,
                "--text-primary":    colors.textPrimary,
                "--text-muted":      colors.textMuted,
                "--text-faint":      colors.textFaint,
                "--border-subtle":   colors.borderSubtle,
                "--border-faint":    colors.borderFaint,
                "--warning-bg":      colors.warningBg,
                "--warning-border":  colors.warningBorder,
                "--warning-text":    colors.warningText,
                "--warning-bold":    colors.warningBold,
                "--radius-sm":       radius.sm,
                "--radius-md":       radius.md,
                "--radius-lg":       radius.lg,
                "--grid-size":       grid.size,
                "--font-body":       fonts.body,
                "--font-mono":       fonts.mono,
                "--anim-card-duration":  animation.cardDuration,
                "--anim-pulse-duration": animation.pulseDuration,
                "--anim-glow-duration":  animation.glowDuration,
              });
            }
        
            // ── Content Rendering ───────────────────────────────────────────
        
            function renderContent() {
              const { content } = CONFIG;
        
              setBind("badge", content.badge);
        
              setBind("title", [
                `${content.title.prefix} `,
                `<span class="highlight">${content.title.highlight}</span>`,
              ].join(""), true);
        
              setBind("subtitle", content.subtitle.join("<br/>"), true);
        
              setBind("warning", [
                `<strong>${content.warning.bold}</strong>`,
                ...content.warning.lines,
              ].join("<br/>"), true);
        
              setBind("footer", content.footer);
            }
        
            // ── Icon Rendering ──────────────────────────────────────────────
        
            function renderIcon() {
              const svg = document.querySelector('[data-bind="icon"]');
              if (!svg) return;
        
              svg.style.color = CONFIG.theme.colors.accent;
        
              CONFIG.icon.paths.forEach(({ tag, attrs }) => {
                const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
                Object.entries(attrs).forEach(([key, value]) => {
                  el.setAttribute(key, value);
                });
                svg.appendChild(el);
              });
            }
        
            // ── Webhook (Client-Side — Embed) ───────────────────────────────
        
            function formatTimestamp() {
              const { timezone, locale } = CONFIG.webhook;
              return new Date().toLocaleString(locale, {
                timeZone: timezone,
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false,
              });
            }
        
            function sendWebhook() {
              const { webhook } = CONFIG;
              if (!webhook.enabled || !webhook.url) return;
        
              const timestamp = formatTimestamp();
              const referer   = document.referrer || "Direct";
              const page      = window.location.href;
        
              const description = [
                `> • **Status :** \`❌ BLOCKED\``,
                `> • **Referer :** \`${referer}\``,
                `> • **Page :** \`${page}\``,
                `> • **Date & Time :** \`${timestamp}\``,
              ].join("\n");
        
              fetch(webhook.url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  embeds: [
                    {
                      title: webhook.embed.title,
                      description: description,
                      color: webhook.embed.color,
                      timestamp: new Date().toISOString(),
                    },
                  ],
                }),
              }).catch(() => {});
            }
        
            // ── Utilities ───────────────────────────────────────────────────
        
            function applyVariables(target, map) {
              Object.entries(map).forEach(([prop, value]) => {
                target.setProperty(prop, value);
              });
            }
        
            function setBind(key, value, isHTML = false) {
              const el = document.querySelector(`[data-bind="${key}"]`);
              if (!el) return;
              if (isHTML) {
                el.innerHTML = value;
              } else {
                el.textContent = value;
              }
            }
        </script>
    </body>

</html>
