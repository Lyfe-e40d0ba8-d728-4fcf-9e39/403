<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flycer</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0f;
      height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
    }

    body::before {
      content:'';
      position:fixed;
      inset:0;
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7));
    }

    .card {
      background:#141416;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:40px;
      width:420px;
      max-width:90%;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
    }

    .badge {
      font-size:12px;
      color:#ef4444;
      margin-bottom:20px;
      letter-spacing:1px;
    }

    h1 {
      font-size:28px;
      margin-bottom:10px;
    }

    h1 span {
      color:#ef4444;
    }

    p {
      font-size:14px;
      opacity:0.6;
      margin-bottom:20px;
    }

    .footer {
      font-size:11px;
      opacity:0.3;
      margin-top:20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="badge">SYSTEM ACTIVE</div>

    <h1>Flycer <span>Gateway</span></h1>

    <p>
      Secure endpoint system is running.<br/>
      Unauthorized access is restricted.
    </p>

    <div class="footer">
      flycer.my.id · API Ready
    </div>
  </div>
</body>
</html>
